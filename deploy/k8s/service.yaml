apiVersion: v1
kind: Service
metadata:
  name: helm
  namespace: helm-system
  labels:
    app: helm
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  selector:
    app: helm
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helm
  namespace: helm-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: helm.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: helm
            port:
              number: 8080
