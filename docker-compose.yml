version: '3.8'

services:
  helm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helm
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - helm_data:/data
      - helm_config:/config
    environment:
      - HELM_LOG_LEVEL=info
      - HELM_LOG_FORMAT=json
      - HELM_SERVER_PORT=8080
      - HELM_METRICS_ENABLED=true
      - HELM_METRICS_PORT=9090
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - helm_network

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: helm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - helm_network
    profiles:
      - with-redis

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: helm_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - helm_network
    profiles:
      - with-metrics

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: helm_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - helm_network
    profiles:
      - with-metrics

volumes:
  helm_data:
    driver: local
  helm_config:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  helm_network:
    driver: bridge
